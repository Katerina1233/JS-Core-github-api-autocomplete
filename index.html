<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>GitHub Repositories Search</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <input
      id="search"
      type="text"
      placeholder="Введите ключевое слово..."
      autocomplete="off"
    />

    <ul id="autocomplete" class="autocomplete"></ul>

    <ul id="repo-list" class="repo-list"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
